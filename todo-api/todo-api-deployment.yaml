apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api-deployment
  namespace: development
  labels:
    app: todo-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - todo-api
                topologyKey: kubernetes.io/hostname
      restartPolicy: Always
      containers:
        - name: todo-api
          image: aliakkas006255/todo-api:1ecb72ec3eb7f2ef3e35cef75e2110a1141b1f8f
          securityContext:
            allowPrivilegeEscalation: false
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: '300M'
              cpu: '100m'
            limits:
              memory: '500M'
              cpu: '200m'
          env:
            - name: TZ
              value: 'UTC'
          envFrom:
            - configMapRef:
                name: todo-api-configmap
            - secretRef:
                name: todo-api-secret
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 15
            periodSeconds: 20
            timeoutSeconds: 3
            initialDelaySeconds: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
