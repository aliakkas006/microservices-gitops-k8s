apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: user-api-route
  namespace: development
spec:
  parentRefs:
    - name: dev-gateway
      namespace: nginx-gateway

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/users
      backendRefs:
        - name: user-api-svc
          port: 5000

    - matches:
        - path:
            type: PathPrefix
            value: /user/health
      backendRefs:
        - name: user-api-svc
          port: 5000
